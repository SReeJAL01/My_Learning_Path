<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Learning Roadmap Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  /* ── THEME TOKENS ── */
  :root {
    --radius: 10px;
    --radius-lg: 16px;

    /* subject colors */
    --py:  #a394f5;
    --cn:  #34d4ac;
    --sq:  #f0b155;
    --ml:  #f07070;
    --dsa: #5bbcf7;
    --da:  #b8e05a;

    --py-bg:  rgba(163,148,245,0.12);
    --cn-bg:  rgba(52,212,172,0.12);
    --sq-bg:  rgba(240,177,85,0.12);
    --ml-bg:  rgba(240,112,112,0.12);
    --dsa-bg: rgba(91,188,247,0.12);
    --da-bg:  rgba(184,224,90,0.12);
  }

  [data-theme="dark"] {
    --bg:        #090909;
    --surface:   #111113;
    --surface2:  #18181c;
    --surface3:  #202026;
    --border:    rgba(255,255,255,0.08);
    --border2:   rgba(255,255,255,0.14);
    --text:      #ffffff;
    --text2:     #c8c8d4;
    --text3:     #606072;
    --done-bg:   rgba(255,255,255,0.03);
    --done-text: #484860;
    --tag-text:  #ffffff;
    --grid-line: rgba(255,255,255,0.02);
  }

  [data-theme="light"] {
    --bg:        #f2f2f5;
    --surface:   #ffffff;
    --surface2:  #f7f7fa;
    --surface3:  #ededf2;
    --border:    rgba(0,0,0,0.07);
    --border2:   rgba(0,0,0,0.13);
    --text:      #0e0e14;
    --text2:     #3a3a50;
    --text3:     #9090a8;
    --done-bg:   rgba(0,0,0,0.025);
    --done-text: #b0b0c0;
    --tag-text:  #1a1a2e;
    --grid-line: rgba(0,0,0,0.03);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.6;
    transition: background 0.25s, color 0.25s;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 40px 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* ── HEADER ── */
  .header { margin-bottom: 36px; }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .logo-area h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.7px;
    color: var(--text);
    margin-bottom: 4px;
  }

  .logo-area p {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  /* Theme toggle */
  .theme-toggle {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text3);
  }

  .theme-toggle:hover { color: var(--text); border-color: var(--border2); }

  .theme-toggle svg { width: 17px; height: 17px; }

  [data-theme="light"] .icon-moon { display: none; }
  [data-theme="dark"]  .icon-sun  { display: none; }

  .total-badge {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 12px 18px;
    text-align: right;
  }

  .total-badge .num {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    display: block;
    line-height: 1.1;
  }

  .total-badge .lbl {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  /* ── OVERALL BAR ── */
  .overall-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    transition: background 0.25s;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .bar-labels span { font-size: 12px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
  .bar-labels strong { font-family: 'Syne', sans-serif; font-size: 16px; color: var(--text); font-weight: 600; }

  .bar-track { height: 5px; background: var(--surface3); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); background: linear-gradient(90deg, var(--py), var(--cn), var(--sq), var(--ml), var(--dsa), var(--da)); background-size: 300% 100%; }

  /* ── SUBJECT STRIPS ── */
  .subject-strips {
    display: grid;
    grid-template-columns: repeat(3, minmax(0,1fr));
    gap: 10px;
    margin-bottom: 28px;
  }

  .strip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    transition: border-color 0.2s, background 0.25s;
    cursor: default;
  }

  .strip:hover { border-color: var(--border2); }

  .strip-head { display: flex; align-items: center; gap: 7px; margin-bottom: 10px; }

  .strip-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .strip-name {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text2);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
  }

  .strip-pct {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1;
  }

  .strip-bar { height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
  .strip-fill { height: 100%; border-radius: 2px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }

  /* ── FILTER TABS ── */
  .filter-row { display: flex; gap: 6px; margin-bottom: 22px; flex-wrap: wrap; }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { color: var(--text2); border-color: var(--border2); }
  .filter-btn.active { background: var(--surface2); border-color: var(--border2); color: var(--text); }

  /* ── PHASE BLOCKS ── */
  .phase-block {
    margin-bottom: 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    background: var(--surface);
    overflow: hidden;
    transition: border-color 0.2s, background 0.25s;
  }

  .phase-block:hover { border-color: var(--border2); }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .phase-header:hover { background: var(--surface2); }

  .phase-num {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text3);
    width: 54px;
    flex-shrink: 0;
  }

  .phase-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    letter-spacing: -0.2px;
  }

  .phase-weeks { font-size: 12px; color: var(--text3); flex-shrink: 0; }

  .phase-prog {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text2);
    flex-shrink: 0;
    min-width: 40px;
    text-align: right;
  }

  .phase-chevron {
    width: 18px; height: 18px; flex-shrink: 0;
    color: var(--text3);
    transition: transform 0.22s;
    display: flex; align-items: center; justify-content: center;
  }

  .phase-chevron svg { width: 13px; height: 13px; }
  .phase-block.open .phase-chevron { transform: rotate(90deg); }

  .phase-progress-bar { height: 2px; background: var(--surface3); overflow: hidden; }
  .phase-progress-fill { height: 100%; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); background: linear-gradient(90deg, var(--py), var(--cn), var(--sq), var(--ml), var(--dsa), var(--da)); }

  .phase-body { display: none; border-top: 1px solid var(--border); }
  .phase-block.open .phase-body { display: block; }

  /* ── SUBJECT SECTIONS ── */
  .subj-section { border-bottom: 1px solid var(--border); padding: 18px 20px; }
  .subj-section:last-child { border-bottom: none; }

  .subj-head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }

  .subj-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 5px;
  }

  .subj-pill .dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .subj-count { font-size: 12px; color: var(--text3); margin-left: auto; }

  /* ── TOPIC ITEMS ── */
  .topic-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 9px 6px;
    border-bottom: 1px solid rgba(128,128,128,0.06);
    cursor: pointer;
    transition: background 0.12s;
    border-radius: 7px;
  }

  .topic-item:last-child { border-bottom: none; }
  .topic-item:hover { background: rgba(128,128,128,0.05); }

  .topic-item.done .topic-text {
    color: var(--done-text);
    text-decoration: line-through;
    text-decoration-color: var(--done-text);
  }

  .topic-item.done { background: var(--done-bg); }

  .check-box {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
    transition: all 0.15s;
    background: transparent;
  }

  .check-box svg { opacity: 0; transition: opacity 0.15s; width: 11px; height: 11px; }
  .topic-item.done .check-box svg { opacity: 1; }
  .topic-item.done .check-box { border-color: transparent; }

  .topic-text { font-size: 13.5px; color: var(--text2); line-height: 1.55; flex: 1; transition: color 0.15s; }

  /* subject color bindings */
  .t-py  .check-box { border-color: rgba(163,148,245,0.35); }
  .t-cn  .check-box { border-color: rgba(52,212,172,0.35); }
  .t-sq  .check-box { border-color: rgba(240,177,85,0.35); }
  .t-ml  .check-box { border-color: rgba(240,112,112,0.35); }
  .t-dsa .check-box { border-color: rgba(91,188,247,0.35); }
  .t-da  .check-box { border-color: rgba(184,224,90,0.35); }

  .t-py.done  .check-box { background: var(--py); }
  .t-cn.done  .check-box { background: var(--cn); }
  .t-sq.done  .check-box { background: var(--sq); }
  .t-ml.done  .check-box { background: var(--ml); }
  .t-dsa.done .check-box { background: var(--dsa); }
  .t-da.done  .check-box { background: var(--da); }

  .t-py  .check-box svg path,
  .t-cn  .check-box svg path,
  .t-sq  .check-box svg path,
  .t-ml  .check-box svg path,
  .t-dsa .check-box svg path,
  .t-da  .check-box svg path { stroke: #fff; }

  /* pill colors */
  .pill-py  { background: var(--py-bg);  color: var(--py); }
  .pill-cn  { background: var(--cn-bg);  color: var(--cn); }
  .pill-sq  { background: var(--sq-bg);  color: var(--sq); }
  .pill-ml  { background: var(--ml-bg);  color: var(--ml); }
  .pill-dsa { background: var(--dsa-bg); color: var(--dsa); }
  .pill-da  { background: var(--da-bg);  color: var(--da); }

  /* ── ACTIONS ── */
  .actions { display: flex; gap: 10px; margin-top: 28px; justify-content: flex-end; flex-wrap: wrap; }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-ghost:hover { color: var(--text2); border-color: rgba(128,128,128,0.3); }

  .empty-msg { text-align: center; padding: 56px 20px; color: var(--text3); font-size: 13px; letter-spacing: 0.05em; display: none; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  @media (max-width: 640px) {
    .subject-strips { grid-template-columns: repeat(2,minmax(0,1fr)); }
    .phase-weeks { display: none; }
    .header-top { flex-direction: column; }
    .total-badge { text-align: left; }
  }
  @media (max-width: 400px) {
    .subject-strips { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <div class="logo-area">
        <h1>Roadmap Tracker</h1>
        <p>Python · Networks · SQL · ML · DSA · Data Analytics</p>
      </div>
      <div class="header-right">
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
          </svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        </button>
        <div class="total-badge">
          <span class="num" id="total-pct">0%</span>
          <span class="lbl">Overall</span>
        </div>
      </div>
    </div>

    <div class="overall-bar-wrap">
      <div class="bar-labels">
        <span>Total Progress</span>
        <strong id="bar-count">0 / 0 topics</strong>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="overall-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="subject-strips" id="strips-container"></div>

    <div class="filter-row" id="filter-row"></div>
  </div>

  <div id="phase-container"></div>
  <div class="empty-msg" id="empty-msg">No topics match this filter.</div>

  <div class="actions">
    <button class="btn-ghost" onclick="expandAll()">Expand All</button>
    <button class="btn-ghost" onclick="collapseAll()">Collapse All</button>
    <button class="btn-ghost" onclick="confirmReset()">Reset Progress</button>
  </div>

</div>
<script>
/* ═══════════════════════════ DATA ═══════════════════════════ */
const SUBJECTS = [
  { key:'python', label:'Python / AI-ML',     short:'Python',   cls:'py',  color:'var(--py)'  },
  { key:'cn',     label:'Computer Networks',  short:'Networks', cls:'cn',  color:'var(--cn)'  },
  { key:'sql',    label:'SQL & Databases',    short:'SQL',      cls:'sq',  color:'var(--sq)'  },
  { key:'ml',     label:'Machine Learning',   short:'ML',       cls:'ml',  color:'var(--ml)'  },
  { key:'dsa',    label:'DSA',                short:'DSA',      cls:'dsa', color:'var(--dsa)' },
  { key:'da',     label:'Data Analytics',     short:'Analytics',cls:'da',  color:'var(--da)'  },
];

const DATA = [
  {
    id:1, weeks:'Wk 1–3', title:'Phase 1 — Absolute Foundations',
    python:['Python syntax: variables, data types, operators','Control flow: if/else, for, while loops','Functions: def, return, *args, **kwargs','Lists, tuples, sets, dictionaries','File I/O: read/write txt and csv','Practice: 30 small problems on HackerRank'],
    cn:['What is a network? LAN, WAN, MAN, Internet','OSI Model: 7 layers and their roles','TCP/IP Model: 4 layers — mapping to OSI','Physical layer: bits, cables, fiber, wireless','Data Link layer: MAC addresses, Ethernet, switches','Practice: draw OSI layers from memory daily'],
    sql:['What is a RDBMS? MySQL vs PostgreSQL vs SQLite','Install MySQL + GUI (DBeaver or TablePlus)','CREATE TABLE, data types (INT, VARCHAR, DATE)','INSERT, SELECT, WHERE, ORDER BY, LIMIT','UPDATE, DELETE — with safe WHERE clauses','Practice: build a simple student-marks database'],
    ml:['What is ML? Supervised vs Unsupervised vs RL','Types of ML problems: classification, regression, clustering','Math review: linear algebra — vectors, matrices, dot product','Math review: calculus — derivatives, chain rule (intuition)','Math review: probability — Bayes theorem, distributions','Setup: install scikit-learn, jupyter, pandas, numpy'],
    dsa:['Big O notation: time and space complexity','Arrays: access, insert, delete — time complexity','Strings: traversal, slicing, common patterns','Two-pointer technique: basic problems','Sliding window: fixed and variable size','Practice: 10 LeetCode Easy array/string problems'],
    da:['What is Data Analytics? Descriptive vs Predictive vs Prescriptive','Data types: structured, semi-structured, unstructured','Spreadsheet basics: Excel/Google Sheets formulas','Data collection: surveys, APIs, web scraping intro','Intro to Jupyter Notebook: cells, markdown, execution','Install: pandas, numpy, matplotlib, seaborn'],
  },
  {
    id:2, weeks:'Wk 4–6', title:'Phase 2 — Core Building Blocks',
    python:['OOP: classes, objects, inheritance, polymorphism','Exception handling: try/except/finally','Modules & packages: import system, pip','List comprehensions, generators, lambda','Numpy: arrays, vectorized ops, broadcasting','Pandas basics: DataFrame, Series, read_csv, head'],
    cn:['Network layer: IP addressing (IPv4, IPv6)','Subnetting: CIDR notation, subnet masks','ARP, ICMP, ping and traceroute explained','Routing basics: static vs dynamic, routing tables','Transport layer: TCP vs UDP — when to use each','TCP 3-way handshake and connection teardown'],
    sql:['SELECT with multiple conditions: AND, OR, NOT','DISTINCT, aliases (AS), column expressions','Aggregate functions: COUNT, SUM, AVG, MIN, MAX','GROUP BY and HAVING — with filtering logic','JOINs: INNER JOIN (master this first)','Practice: 20 LeetCode SQL Easy problems'],
    ml:['Linear Regression: cost function, gradient descent (math)','Linear Regression: implement from scratch in numpy','Logistic Regression: sigmoid function, decision boundary','Train/test split: why it matters, random_state','Model evaluation: MSE, RMSE, MAE for regression','Model evaluation: accuracy, confusion matrix for classification'],
    dsa:['Linked Lists: singly linked — traverse, insert, delete','Doubly linked list: bidirectional pointer logic','Stack: LIFO, push/pop, implement with list/node','Queue: FIFO, enqueue/dequeue, implement with deque','Hash maps: key-value, collision handling, Python dict internals','Practice: 10 LeetCode Easy — linked list, stack, queue'],
    da:['Pandas: read CSV, inspect shape, dtypes, head/tail','Pandas: filtering rows, selecting columns, boolean masks','Handling missing data: isnull, dropna, fillna strategies','Descriptive stats: mean, median, mode, std, percentiles','Matplotlib basics: line chart, bar chart, scatter plot','Seaborn: distribution plots, count plots, box plots'],
  },
  {
    id:3, weeks:'Wk 7–10', title:'Phase 3 — Intermediate Logic & Patterns',
    python:['Pandas advanced: merge, groupby, pivot, melt','Data cleaning: null handling, dtype conversion','Matplotlib: line, bar, scatter, histogram','Seaborn: heatmaps, pairplot, distplot','Intro to Statistics: mean, median, std, correlation','EDA project: analyze a Kaggle dataset end-to-end'],
    cn:['Application layer: HTTP, HTTPS, DNS flow','How DNS resolution works step by step','DHCP: dynamic IP assignment process','FTP, SMTP, POP3, IMAP — email protocol flow','Wireshark: capture and analyze live packets','Lab: simple client-server with Python sockets'],
    sql:['LEFT, RIGHT, FULL OUTER JOIN — with diagrams','SELF JOIN and CROSS JOIN — when they apply','Subqueries: scalar, correlated, in WHERE/FROM','UNION, INTERSECT, EXCEPT','String functions: CONCAT, SUBSTRING, TRIM, LIKE','Date functions: NOW, DATEDIFF, DATE_FORMAT'],
    ml:['Scikit-learn pipeline: fit, predict, score workflow','Decision Tree: entropy, information gain, pruning','Random Forest: bagging, feature importance, n_estimators','KNN: distance metrics, choosing K, curse of dimensionality','Naive Bayes: prior/posterior, Gaussian NB for continuous','SVM: hyperplane, margin, kernel trick (linear first)'],
    dsa:['Binary Search: iterative and recursive, time O(log n)','Sorting — Bubble, Selection, Insertion: logic + code','Merge Sort: divide-and-conquer, time O(n log n)','Quick Sort: pivot, partition, average vs worst case','Trees: binary tree — node, root, leaf, height, traversal','BFS and DFS on trees: iterative and recursive'],
    da:['Exploratory Data Analysis (EDA) workflow: shape → types → nulls → stats → plots','Univariate analysis: distribution, skewness, outliers','Bivariate analysis: scatter, correlation matrix, heatmap','Groupby analysis: segment comparison, pivot tables','Outlier detection: IQR method, z-score method','EDA project: full analysis of a real Kaggle dataset'],

/* ═══════════════════════════ STATE ═══════════════════════════ */
const STORAGE_KEY = 'roadmap_v2';
const THEME_KEY   = 'roadmap_theme';
let state = {};
let currentFilter = 'all';

function loadState() {
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { state = {}; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function topicKey(pid, subj, idx) { return `p${pid}_${subj}_${idx}`; }
function isDone(pid, subj, idx)   { return !!state[topicKey(pid, subj, idx)]; }

function toggleTopic(pid, subj, idx) {
  const k = topicKey(pid, subj, idx);
  state[k] = !state[k];
  saveState();
  renderAll();
}

/* ═══════════════════════════ STATS ═══════════════════════════ */
function getStats() {
  const totals = {}, dones = {};
  SUBJECTS.forEach(s => { totals[s.key] = 0; dones[s.key] = 0; });
  let total = 0, done = 0;

  DATA.forEach(p => {
    SUBJECTS.forEach(s => {
      p[s.key].forEach((_, i) => {
        totals[s.key]++;
        total++;
        const d = isDone(p.id, s.key, i);
        if(d) { dones[s.key]++; done++; }
      });
    });
  });
  return { total, done, totals, dones };
}

function pct(d, t) { return t === 0 ? 0 : Math.round(d/t*100); }

/* ═══════════════════════════ BUILD STATIC UI ═══════════════════════════ */
function buildFilters() {
  const row = document.getElementById('filter-row');
  const filters = [
    {f:'all', label:'All'},
    ...SUBJECTS.map(s => ({f:s.key, label:s.short})),
    {f:'undone', label:'Remaining'},
    {f:'done',   label:'Completed'},
  ];
  filters.forEach(({f, label}) => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (f === 'all' ? ' active' : '');
    btn.textContent = label;
    btn.onclick = () => setFilter(f, btn);
    row.appendChild(btn);
  });
}

function buildStrips() {
  const c = document.getElementById('strips-container');
  SUBJECTS.forEach(s => {
    c.innerHTML += `
      <div class="strip">
        <div class="strip-head">
          <span class="strip-dot" style="background:${s.color}"></span>
          <span class="strip-name">${s.short}</span>
        </div>
        <div class="strip-pct" id="pct-${s.key}">0%</div>
        <div class="strip-bar"><div class="strip-fill" id="bar-${s.key}" style="width:0%;background:${s.color}"></div></div>
      </div>`;
  });
}

/* ═══════════════════════════ RENDER ═══════════════════════════ */
function renderAll() {
  const stats = getStats();
  const overall = pct(stats.done, stats.total);

  document.getElementById('total-pct').textContent = overall + '%';
  document.getElementById('bar-count').textContent = stats.done + ' / ' + stats.total + ' topics';
  document.getElementById('overall-bar').style.width = overall + '%';

  SUBJECTS.forEach(s => {
    const p = pct(stats.dones[s.key], stats.totals[s.key]);
    document.getElementById('pct-' + s.key).textContent = p + '%';
    document.getElementById('bar-' + s.key).style.width = p + '%';
  });

  renderPhases();
}

function renderPhases() {
  const container = document.getElementById('phase-container');
  const openPhases = new Set(
    Array.from(document.querySelectorAll('.phase-block.open')).map(el => el.dataset.id)
  );

  container.innerHTML = '';
  let anyVisible = false;

  DATA.forEach(phase => {
    let phTotal = 0, phDone = 0;
    SUBJECTS.forEach(s => {
      phase[s.key].forEach((_, i) => {
        phTotal++;
        if(isDone(phase.id, s.key, i)) phDone++;
      });
    });
    const phPct = pct(phDone, phTotal);

    const block = document.createElement('div');
    block.className = 'phase-block' + (openPhases.has(String(phase.id)) ? ' open' : '');
    block.dataset.id = phase.id;

    block.innerHTML = `
      <div class="phase-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="phase-num">Phase ${phase.id}</span>
        <span class="phase-name">${phase.title.replace(/^Phase \d+ — /,'')}</span>
        <span class="phase-weeks">${phase.weeks}</span>
        <span class="phase-prog">${phPct}%</span>
        <span class="phase-chevron">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 2 8 6 4 10"/>
          </svg>
        </span>
      </div>
      <div class="phase-progress-bar"><div class="phase-progress-fill" style="width:${phPct}%"></div></div>
      <div class="phase-body" id="pb-${phase.id}"></div>
    `;

    container.appendChild(block);
    const body = document.getElementById('pb-' + phase.id);

    let phaseVisible = false;

    SUBJECTS.forEach(s => {
      const matchSubj = currentFilter === 'all' || currentFilter === s.key ||
                        currentFilter === 'undone' || currentFilter === 'done';
      if(!matchSubj) return;

      const topics = phase[s.key];
      let sVisible = false;
      let rowsHtml = '';

      topics.forEach((text, i) => {
        const done = isDone(phase.id, s.key, i);
        if(currentFilter === 'undone' && done) return;
        if(currentFilter === 'done'   && !done) return;
        sVisible = true;
        phaseVisible = true;
        anyVisible = true;
        rowsHtml += `
          <div class="topic-item t-${s.cls}${done ? ' done':''}" onclick="toggleTopic(${phase.id},'${s.key}',${i})">
            <div class="check-box">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 6l3 3 5-5"/>
              </svg>
            </div>
            <span class="topic-text">${text}</span>
          </div>`;
      });

      if(!sVisible) return;

      const sDone = topics.filter((_,i) => isDone(phase.id, s.key, i)).length;
      const sec = document.createElement('div');
      sec.className = 'subj-section';
      sec.innerHTML = `
        <div class="subj-head">
          <span class="subj-pill pill-${s.cls}"><span class="dot" style="background:${s.color}"></span>${s.label}</span>
          <span class="subj-count">${sDone} / ${topics.length}</span>
        </div>${rowsHtml}`;
      body.appendChild(sec);
    });

    block.style.display = phaseVisible ? '' : 'none';
  });

  document.getElementById('empty-msg').style.display = anyVisible ? 'none' : 'block';
}

/* ═══════════════════════════ CONTROLS ═══════════════════════════ */
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if(f !== 'all') {
    DATA.forEach(p => {
      const b = document.querySelector(`.phase-block[data-id="${p.id}"]`);
      if(b) b.classList.add('open');
    });
  }
  renderPhases();
}

function expandAll()  { document.querySelectorAll('.phase-block').forEach(b => b.classList.add('open')); }
function collapseAll(){ document.querySelectorAll('.phase-block').forEach(b => b.classList.remove('open')); }

function confirmReset() {
  if(confirm('Reset all progress? This cannot be undone.')) {
    state = {};
    saveState();
    renderAll();
  }
}

function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
}

/* ═══════════════════════════ INIT ═══════════════════════════ */
const savedTheme = localStorage.getItem(THEME_KEY);
if(savedTheme) document.documentElement.setAttribute('data-theme', savedTheme);

loadState();
buildFilters();
buildStrips();
renderAll();

// Open phase 1 by default
setTimeout(() => {
  const first = document.querySelector('.phase-block[data-id="1"]');
  if(first && !first.classList.contains('open')) first.classList.add('open');
}, 0);
</script>
