<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learning Roadmap Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      /* Dark Theme Colors */
      --bg-dark: #0a0a0c;
      --surface-dark: #111114;
      --surface-dark-2: #18181d;
      --surface-dark-3: #1f1f26;
      --border-dark: rgba(255,255,255,0.07);
      --border-dark-2: rgba(255,255,255,0.12);
      --text-dark: #ffffff;
      --text-dark-2: #e0e0e6;
      --text-dark-3: #a0a0ab;
      
      /* Light Theme Colors */
      --bg-light: #f9fafb;
      --surface-light: #ffffff;
      --surface-light-2: #f3f4f6;
      --surface-light-3: #e5e7eb;
      --border-light: rgba(0,0,0,0.08);
      --border-light-2: rgba(0,0,0,0.12);
      --text-light: #1a1a1f;
      --text-light-2: #3a3a42;
      --text-light-3: #6a6a75;
      
      /* Subject Colors */
      --py: #8b7ff0;
      --py-bg-dark: rgba(139,127,240,0.12);
      --py-bg-light: rgba(139,127,240,0.08);
      --py-glow: rgba(139,127,240,0.2);
      
      --cn: #2ec4a0;
      --cn-bg-dark: rgba(46,196,160,0.12);
      --cn-bg-light: rgba(46,196,160,0.08);
      --cn-glow: rgba(46,196,160,0.2);
      
      --sq: #e8a44a;
      --sq-bg-dark: rgba(232,164,74,0.12);
      --sq-bg-light: rgba(232,164,74,0.08);
      --sq-glow: rgba(232,164,74,0.2);
      
      --done: rgba(16,185,129,0.1);
      --radius: 12px;
      --radius-lg: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-dark);
      color: var(--text-dark);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      line-height: 1.7;
      transition: background 0.4s ease, color 0.4s ease;
    }

    body.light-theme {
      background: var(--bg-light);
      color: var(--text-light);
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 50px 60px 100px;
      position: relative;
      z-index: 1;
    }

    /* HEADER */
    .header {
      margin-bottom: 50px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 30px;
      flex-wrap: wrap;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 30px;
      flex-wrap: wrap;
      width: 100%;
      margin-bottom: 30px;
    }

    .logo-area h1 {
      font-family: 'Syne', sans-serif;
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-dark);
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--py), var(--cn), var(--sq));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    body.light-theme .logo-area h1 {
      color: var(--text-light);
      background: linear-gradient(135deg, var(--py), var(--cn), var(--sq));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-area p {
      font-size: 16px;
      color: var(--text-dark-3);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    body.light-theme .logo-area p {
      color: var(--text-light-3);
    }

    .header-controls {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .theme-toggle {
      background: var(--surface-dark-2);
      border: 1px solid var(--border-dark-2);
      color: var(--text-dark);
      width: 50px;
      height: 50px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.3s ease;
    }

    body.light-theme .theme-toggle {
      background: var(--surface-light-2);
      border-color: var(--border-light-2);
      color: var(--text-light);
    }

    .theme-toggle:hover {
      transform: scale(1.1);
      border-color: var(--py);
    }

    .total-badge {
      background: var(--surface-dark-2);
      border: 1px solid var(--border-dark-2);
      border-radius: var(--radius);
      padding: 18px 28px;
      text-align: right;
      flex-shrink: 0;
      transition: all 0.3s ease;
    }

    body.light-theme .total-badge {
      background: var(--surface-light-2);
      border-color: var(--border-light-2);
    }

    .total-badge:hover {
      border-color: var(--py);
      transform: translateY(-2px);
    }

    .total-badge .num {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-dark);
      display: block;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    body.light-theme .total-badge .num {
      color: var(--text-light);
    }

    .total-badge .lbl {
      font-size: 13px;
      color: var(--text-dark-3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
    }

    body.light-theme .total-badge .lbl {
      color: var(--text-light-3);
    }

    /* OVERALL PROGRESS BAR */
    .overall-bar-wrap {
      background: var(--surface-dark);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      margin-bottom: 32px;
      transition: all 0.3s ease;
    }

    body.light-theme .overall-bar-wrap {
      background: var(--surface-light);
      border-color: var(--border-light);
    }

    .bar-labels {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .bar-labels span {
      font-size: 14px;
      color: var(--text-dark-3);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 600;
    }

    body.light-theme .bar-labels span {
      color: var(--text-light-3);
    }

    .bar-labels strong {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      color: var(--text-dark);
      font-weight: 600;
    }

    body.light-theme .bar-labels strong {
      color: var(--text-light);
    }

    .bar-track {
      height: 6px;
      background: var(--surface-dark-3);
      border-radius: 3px;
      overflow: hidden;
    }

    body.light-theme .bar-track {
      background: var(--surface-light-3);
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(90deg, var(--py), var(--cn), var(--sq));
      background-size: 200% 100%;
      box-shadow: 0 0 20px var(--py-glow);
    }

    /* SUBJECT PROGRESS STRIPS */
    .subject-strips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .strip {
      background: var(--surface-dark);
      border: 1px solid var(--border-dark);
      border-radius: var(--radius);
      padding: 20px 22px;
      transition: all 0.3s ease;
    }

    body.light-theme .strip {
      background: var(--surface-light);
      border-color: var(--border-light);
    }

    .strip:hover {
      border-color: var(--border-dark-2);
      transform: translateY(-4px);
    }

    body.light-theme .strip:hover {
      border-color: var(--border-light-2);
    }

    .strip-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .strip-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .strip-name {
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-dark-3);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }

    body.light-theme .strip-name {
      color: var(--text-light-3);
    }

    .strip-pct {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
      line-height: 1;
    }

    body.light-theme .strip-pct {
      color: var(--text-light);
    }

    .strip-bar {
      height: 4px;
      background: var(--surface-dark-3);
      border-radius: 2px;
      overflow: hidden;
    }

    body.light-theme .strip-bar {
      background: var(--surface-light-3);
    }

    .strip-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* FILTER TABS */
    .filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--surface-dark-2);
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      color: var(--text-dark-3);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 10px 18px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    body.light-theme .filter-btn {
      background: var(--surface-light-2);
      border-color: var(--border-light);
      color: var(--text-light-3);
    }

    .filter-btn:hover {
      color: var(--text-dark-2);
      border-color: var(--border-dark-2);
    }

    body.light-theme .filter-btn:hover {
      color: var(--text-light-2);
      border-color: var(--border-light-2);
    }

    .filter-btn.active {
      background: var(--py);
      border-color: var(--py);
      color: #ffffff;
      box-shadow: 0 4px 16px rgba(139,127,240,0.3);
    }

    /* PHASES */
    .phase-block {
      margin-bottom: 16px;
      border: 1px solid var(--border-dark);
      border-radius: var(--radius-lg);
      background: var(--surface-dark);
      overflow: hidden;
      transition: all 0.3s ease;
    }

    body.light-theme .phase-block {
      background: var(--surface-light);
      border-color: var(--border-light);
    }

    .phase-block:hover {
      border-color: var(--border-dark-2);
    }

    body.light-theme .phase-block:hover {
      border-color: var(--border-light-2);
    }

    .phase-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 22px 28px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }

    .phase-header:hover {
      background: var(--surface-dark-2);
    }

    body.light-theme .phase-header:hover {
      background: var(--surface-light-2);
    }

    .phase-num {
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dark-3);
      width: 60px;
      flex-shrink: 0;
    }

    body.light-theme .phase-num {
      color: var(--text-light-3);
    }

    .phase-name {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--text-dark);
      flex: 1;
      letter-spacing: -0.2px;
    }

    body.light-theme .phase-name {
      color: var(--text-light);
    }

    .phase-weeks {
      font-size: 14px;
      color: var(--text-dark-3);
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    body.light-theme .phase-weeks {
      color: var(--text-light-3);
    }

    .phase-prog {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dark-2);
      flex-shrink: 0;
      min-width: 45px;
      text-align: right;
    }

    body.light-theme .phase-prog {
      color: var(--text-light-2);
    }

    .phase-chevron {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: var(--text-dark-3);
      transition: transform 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body.light-theme .phase-chevron {
      color: var(--text-light-3);
    }

    .phase-chevron svg {
      width: 14px;
      height: 14px;
    }

    .phase-block.open .phase-chevron {
      transform: rotate(90deg);
    }

    /* Thin progress bar under header */
    .phase-progress-bar {
      height: 3px;
      background: var(--surface-dark-3);
      overflow: hidden;
    }

    body.light-theme .phase-progress-bar {
      background: var(--surface-light-3);
    }

    .phase-progress-fill {
      height: 100%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(90deg, var(--py) 0%, var(--cn) 50%, var(--sq) 100%);
    }

    /* PHASE BODY */
    .phase-body {
      display: none;
      border-top: 1px solid var(--border-dark);
    }

    body.light-theme .phase-body {
      border-top-color: var(--border-light);
    }

    .phase-block.open .phase-body {
      display: block;
    }

    /* SUBJECT SECTION inside phase */
    .subj-section {
      border-bottom: 1px solid var(--border-dark);
      padding: 24px 28px;
    }

    body.light-theme .subj-section {
      border-bottom-color: var(--border-light);
    }

    .subj-section:last-child {
      border-bottom: none;
    }

    .subj-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .subj-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 6px;
    }

    .subj-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .subj-count {
      font-size: 13px;
      color: var(--text-dark-3);
      margin-left: auto;
    }

    body.light-theme .subj-count {
      color: var(--text-light-3);
    }

    /* TOPIC ITEMS */
    .topic-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 8px;
      padding-left: 6px;
      padding-right: 6px;
    }

    body.light-theme .topic-item {
      border-bottom-color: rgba(0,0,0,0.03);
    }

    .topic-item:last-child {
      border-bottom: none;
    }

    .topic-item:hover {
      background: rgba(255,255,255,0.04);
    }

    body.light-theme .topic-item:hover {
      background: rgba(0,0,0,0.04);
    }

    .topic-item.done .topic-text {
      color: var(--text-dark-3);
      text-decoration: line-through;
      text-decoration-color: var(--text-dark-3);
    }

    body.light-theme .topic-item.done .topic-text {
      color: var(--text-light-3);
      text-decoration-color: var(--text-light-3);
    }

    .topic-item.done {
      background: var(--done);
    }

    /* Custom checkbox */
    .check-box {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--border-dark-2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: all 0.2s;
      background: transparent;
    }

    body.light-theme .check-box {
      border-color: var(--border-light-2);
    }

    .topic-item.done .check-box {
      border-color: transparent;
    }

    .check-box svg {
      opacity: 0;
      transition: opacity 0.2s;
      width: 12px;
      height: 12px;
    }

    .topic-item.done .check-box svg {
      opacity: 1;
    }

    .topic-text {
      font-size: 16px;
      color: var(--text-dark-2);
      line-height: 1.6;
      flex: 1;
      transition: color 0.2s;
    }

    body.light-theme .topic-text {
      color: var(--text-light-2);
    }

    /* Subject-specific colors */
    .py .check-box { border-color: rgba(139,127,240,0.4); }
    .py.done .check-box { background: var(--py); }
    .py .check-box svg path { stroke: #fff; }
    .py .subj-pill { background: var(--py-bg-dark); color: var(--py); }
    .py .subj-pill .dot { background: var(--py); }

    body.light-theme .py .check-box { border-color: rgba(139,127,240,0.3); }
    body.light-theme .py .subj-pill { background: var(--py-bg-light); }

    .cn .check-box { border-color: rgba(46,196,160,0.4); }
    .cn.done .check-box { background: var(--cn); }
    .cn .check-box svg path { stroke: #fff; }
    .cn .subj-pill { background: var(--cn-bg-dark); color: var(--cn); }
    .cn .subj-pill .dot { background: var(--cn); }

    body.light-theme .cn .check-box { border-color: rgba(46,196,160,0.3); }
    body.light-theme .cn .subj-pill { background: var(--cn-bg-light); }

    .sq .check-box { border-color: rgba(232,164,74,0.4); }
    .sq.done .check-box { background: var(--sq); }
    .sq .check-box svg path { stroke: #fff; }
    .sq .subj-pill { background: var(--sq-bg-dark); color: var(--sq); }
    .sq .subj-pill .dot { background: var(--sq); }

    body.light-theme .sq .check-box { border-color: rgba(232,164,74,0.3); }
    body.light-theme .sq .subj-pill { background: var(--sq-bg-light); }

    .strip-py { --c: var(--py); }
    .strip-cn { --c: var(--cn); }
    .strip-sq { --c: var(--sq); }
    .strip-fill { background-color: var(--c); }
    .strip-dot-py { background: var(--py); }
    .strip-dot-cn { background: var(--cn); }
    .strip-dot-sq { background: var(--sq); }

    /* RESET BTN */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 40px;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-dark-2);
      color: var(--text-dark-3);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    body.light-theme .btn-ghost {
      border-color: var(--border-light-2);
      color: var(--text-light-3);
    }

    .btn-ghost:hover {
      color: var(--text-dark-2);
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.05);
    }

    body.light-theme .btn-ghost:hover {
      color: var(--text-light-2);
      border-color: rgba(0,0,0,0.15);
      background: rgba(0,0,0,0.03);
    }

    /* Empty state for filter */
    .empty-msg {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dark-3);
      font-size: 16px;
      letter-spacing: 0.05em;
      display: none;
    }

    body.light-theme .empty-msg {
      color: var(--text-light-3);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: var(--surface-dark-3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dark-3); }

    body.light-theme ::-webkit-scrollbar-track { background: var(--bg-light); }
    body.light-theme ::-webkit-scrollbar-thumb { background: var(--surface-light-3); }
    body.light-theme ::-webkit-scrollbar-thumb:hover { background: var(--text-light-3); }

    @media (max-width: 1024px) {
      .container {
        padding: 40px 48px 80px;
      }

      .subject-strips {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 768px) {
      .container {
        padding: 30px 32px 60px;
      }

      .subject-strips {
        grid-template-columns: 1fr;
      }

      .header-top {
        flex-direction: column;
      }

      .phase-weeks {
        display: none;
      }

      .phase-header {
        flex-wrap: wrap;
      }

      .phase-name {
        font-size: 16px;
      }

      .topic-text {
        font-size: 15px;
      }

      .filter-row {
        flex-direction: column;
      }

      .filter-btn {
        flex: 1;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 24px 20px 50px;
      }

      .logo-area h1 {
        font-size: 32px;
      }

      .total-badge {
        padding: 14px 20px;
      }

      .total-badge .num {
        font-size: 26px;
      }

      .phase-num {
        width: auto;
      }

      .phase-name {
        font-size: 15px;
      }

      .topic-text {
        font-size: 14px;
      }

      .header-controls {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-top">
      <div class="logo-area">
        <h1>Roadmap Tracker</h1>
        <p>Python · Networks · SQL — 0 to 100</p>
      </div>
      <div class="header-controls">
        <div class="total-badge">
          <span class="num" id="total-pct">0%</span>
          <span class="lbl">Overall</span>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">
          <span id="theme-icon">🌙</span>
        </button>
      </div>
    </div>

    <div class="overall-bar-wrap">
      <div class="bar-labels">
        <span>Total Progress</span>
        <strong id="bar-count">0 / 0 topics</strong>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="overall-bar" style="width:0%"></div>
      </div>
    </div>

    <div class="subject-strips">
      <div class="strip strip-py">
        <div class="strip-head">
          <span class="strip-dot strip-dot-py"></span>
          <span class="strip-name">Python / AI-ML</span>
        </div>
        <div class="strip-pct" id="py-pct">0%</div>
        <div class="strip-bar"><div class="strip-fill" id="py-bar" style="width:0%;background:var(--py)"></div></div>
      </div>
      <div class="strip strip-cn">
        <div class="strip-head">
          <span class="strip-dot strip-dot-cn"></span>
          <span class="strip-name">Networks</span>
        </div>
        <div class="strip-pct" id="cn-pct">0%</div>
        <div class="strip-bar"><div class="strip-fill" id="cn-bar" style="width:0%;background:var(--cn)"></div></div>
      </div>
      <div class="strip strip-sq">
        <div class="strip-head">
          <span class="strip-dot strip-dot-sq"></span>
          <span class="strip-name">SQL</span>
        </div>
        <div class="strip-pct" id="sq-pct">0%</div>
        <div class="strip-bar"><div class="strip-fill" id="sq-bar" style="width:0%;background:var(--sq)"></div></div>
      </div>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('python', this)">Python / AI-ML</button>
      <button class="filter-btn" onclick="setFilter('cn', this)">Networks</button>
      <button class="filter-btn" onclick="setFilter('sql', this)">SQL</button>
      <button class="filter-btn" onclick="setFilter('undone', this)">Remaining</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Completed</button>
    </div>
  </div>
<div class="actions">
    <button class="btn-ghost" onclick="expandAll()">Expand All</button>
    <button class="btn-ghost" onclick="collapseAll()">Collapse All</button>
    <button class="btn-ghost" onclick="exportToCSV()">Export to CSV</button>
    <button class="btn-ghost" onclick="confirmReset()">Reset Progress</button>
  </div>
  <div id="phase-container"></div>
  <div class="empty-msg" id="empty-msg">No topics match this filter.</div>
</div>

<script>
const DATA = [
  {
    id: 1, weeks: "Wk 1–3", title: "Phase 1 — Absolute Foundations",
    python: [
      "Python syntax: variables, data types, operators",
      "Control flow: if/else, for, while loops",
      "Functions: def, return, *args, **kwargs",
      "Lists, tuples, sets, dictionaries",
      "File I/O: read/write txt and csv",
      "Practice: 30 small problems on HackerRank"
    ],
    cn: [
      "What is a network? LAN, WAN, MAN, Internet",
      "OSI Model: 7 layers and their roles",
      "TCP/IP Model: 4 layers — mapping to OSI",
      "Physical layer: bits, cables, fiber, wireless",
      "Data Link layer: MAC addresses, Ethernet, switches",
      "Practice: draw OSI layers from memory daily"
    ],
    sql: [
      "What is a RDBMS? MySQL vs PostgreSQL vs SQLite",
      "Install MySQL + GUI (DBeaver or TablePlus)",
      "CREATE TABLE, data types (INT, VARCHAR, DATE)",
      "INSERT, SELECT, WHERE, ORDER BY, LIMIT",
      "UPDATE, DELETE — with safe WHERE clauses",
      "Practice: build a simple student-marks database"
    ]
  },
  {
    id: 2, weeks: "Wk 4–6", title: "Phase 2 — Core Concepts Deepen",
    python: [
      "OOP: classes, objects, inheritance, polymorphism",
      "Exception handling: try/except/finally",
      "Modules & packages: import system, pip",
      "List comprehensions, generators, lambda",
      "Numpy: arrays, vectorized ops, broadcasting",
      "Pandas basics: DataFrame, Series, read_csv, head"
    ],
    cn: [
      "Network layer: IP addressing (IPv4, IPv6)",
      "Subnetting: CIDR notation, subnet masks",
      "ARP, ICMP, ping and traceroute explained",
      "Routing basics: static vs dynamic, routing tables",
      "Transport layer: TCP vs UDP — when to use each",
      "TCP 3-way handshake and connection teardown"
    ],
    sql: [
      "SELECT with multiple conditions: AND, OR, NOT",
      "DISTINCT, aliases (AS), column expressions",
      "Aggregate functions: COUNT, SUM, AVG, MIN, MAX",
      "GROUP BY and HAVING — with filtering logic",
      "JOINs: INNER JOIN (master this first)",
      "Practice: answer 20 LeetCode SQL Easy problems"
    ]
  },
  {
    id: 3, weeks: "Wk 7–10", title: "Phase 3 — Data & Intermediate Logic",
    python: [
      "Pandas advanced: merge, groupby, pivot, melt",
      "Data cleaning: null handling, dtype conversion",
      "Matplotlib: line, bar, scatter, histogram",
      "Seaborn: heatmaps, pairplot, distplot",
      "Intro to Statistics: mean, median, std, correlation",
      "EDA project: analyze a Kaggle dataset end-to-end"
    ],
    cn: [
      "Application layer protocols: HTTP, HTTPS, DNS",
      "How DNS resolution works step by step",
      "DHCP: dynamic IP assignment process",
      "FTP, SMTP, POP3, IMAP — email flow",
      "Wireshark: capture and analyze packets",
      "Lab: set up a simple client-server with Python sockets"
    ],
    sql: [
      "LEFT, RIGHT, FULL OUTER JOIN — with diagrams",
      "SELF JOIN and CROSS JOIN — when they apply",
      "Subqueries: scalar, correlated, in WHERE and FROM",
      "UNION, INTERSECT, EXCEPT",
      "String functions: CONCAT, SUBSTRING, TRIM, LIKE",
      "Date functions: NOW, DATEDIFF, DATE_FORMAT"
    ]
  },
  {
    id: 4, weeks: "Wk 11–15", title: "Phase 4 — Machine Learning Entry",
    python: [
      "Scikit-learn: train/test split, fit/predict pattern",
      "Linear Regression: math intuition + sklearn",
      "Logistic Regression: sigmoid, binary classification",
      "Model evaluation: accuracy, precision, recall, F1",
      "Decision Trees and Random Forests",
      "Feature engineering: encoding, scaling, imputation"
    ],
    cn: [
      "Network Security fundamentals: CIA triad",
      "Firewalls: stateful vs stateless, rules",
      "NAT: how private IPs get public addresses",
      "VPN: tunneling, IPSec, SSL/TLS basics",
      "Cryptography basics: symmetric, asymmetric, hashing",
      "TLS/HTTPS: certificate chain, handshake process"
    ],
    sql: [
      "Database design: normalization (1NF, 2NF, 3NF)",
      "Entity-Relationship diagrams: design from scratch",
      "Primary keys, foreign keys, referential integrity",
      "Indexes: clustered vs non-clustered, when to use",
      "Views: CREATE VIEW, updatable vs read-only",
      "Transactions: ACID properties, COMMIT, ROLLBACK"
    ]
  },
  {
    id: 5, weeks: "Wk 16–21", title: "Phase 5 — Intermediate ML + Networks Depth",
    python: [
      "Cross-validation: k-fold, stratified",
      "Hyperparameter tuning: GridSearchCV, RandomSearch",
      "SVM, KNN, Naive Bayes — intuition + code",
      "Unsupervised: K-Means, DBSCAN, PCA",
      "Intro to Neural Networks: perceptron, activation fns",
      "Keras/TensorFlow: build first MLP on MNIST"
    ],
    cn: [
      "Socket programming in Python: TCP & UDP servers",
      "HTTP from scratch: request/response structure",
      "REST APIs: methods, status codes, headers",
      "Load balancers: round-robin, least-conn algorithms",
      "CDN concepts and how caching works",
      "Cloud networking: VPC, subnets, security groups (AWS/GCP)"
    ],
    sql: [
      "Stored procedures: CREATE PROCEDURE, params",
      "Triggers: BEFORE/AFTER INSERT/UPDATE/DELETE",
      "Window functions: ROW_NUMBER, RANK, DENSE_RANK",
      "LEAD, LAG, FIRST_VALUE, LAST_VALUE",
      "CTEs: WITH clause, recursive CTEs",
      "Practice: solve 30 LeetCode SQL Medium problems"
    ]
  },
  {
    id: 6, weeks: "Wk 22–28", title: "Phase 6 — Deep Learning + Advanced Topics",
    python: [
      "PyTorch: tensors, autograd, nn.Module",
      "CNNs: conv layers, pooling, image classification",
      "Transfer learning: ResNet, VGG, fine-tuning",
      "RNNs / LSTMs: sequence problems, time series",
      "Transformers & Attention mechanism — intuition",
      "Hugging Face: use pre-trained BERT/GPT models"
    ],
    cn: [
      "BGP and inter-domain routing (conceptual)",
      "SDN: Software Defined Networking — what and why",
      "Network monitoring: SNMP, NetFlow, Prometheus",
      "Troubleshooting methodology: OSI bottom-up approach",
      "Containerized networking: Docker bridge, host, overlay",
      "Kubernetes networking: pods, services, ingress"
    ],
    sql: [
      "Query optimization: EXPLAIN ANALYZE, query plans",
      "Replication: master-replica, read scaling",
      "Intro to NoSQL: when to prefer MongoDB/Redis",
      "Python + SQL: SQLAlchemy ORM basics, pandas read_sql"
    ]
  },
  {
    id: 7, weeks: "Wk 29–36", title: "Phase 7 — Projects & Interview Readiness",
    python: [
      "End-to-end ML project: data → model → API",
      "FastAPI: serve your ML model as a REST endpoint",
      "MLflow: experiment tracking, model registry",
      "Docker: containerize your ML app",
      "LeetCode Python: 50 medium/hard problems",
      "Resume project: deploy on HuggingFace Spaces or Render"
    ],
    cn: [
      "Build a multi-client chat app with Python sockets",
      "Capture and analyze HTTP traffic with Wireshark",
      "Configure VLANs, routing on Packet Tracer (Cisco)",
      "Network design case study: design a small office LAN",
      "CompTIA Network+ or GATE CN syllabus revision",
      "Mock interviews: explain OSI, TCP, DNS under 2 min each"
    ],
    sql: [
      "Capstone: design and build a full e-commerce DB schema",
      "Write 20 analytical queries on your own schema",
      "Integrate DB with a Python FastAPI backend",
      "Performance audit: run EXPLAIN on all queries",
      "LeetCode SQL: finish all medium + 10 hard",
      "Mock interviews: window fns + optimization explanations"
    ]
  }
];

const STORAGE_KEY = 'roadmap_v2_refined';
let state = {};
let currentFilter = 'all';

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    state = s ? JSON.parse(s) : {};
  } catch(e) { state = {}; }
  
  // Load theme preference
  const theme = localStorage.getItem('roadmap_theme') || 'dark';
  if (theme === 'light') {
    document.body.classList.add('light-theme');
    document.getElementById('theme-icon').textContent = '☀️';
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function toggleTheme() {
  document.body.classList.toggle('light-theme');
  const icon = document.getElementById('theme-icon');
  const isLight = document.body.classList.contains('light-theme');
  icon.textContent = isLight ? '☀️' : '🌙';
  localStorage.setItem('roadmap_theme', isLight ? 'light' : 'dark');
}

function topicKey(phaseId, subj, idx) {
  return `p${phaseId}_${subj}_${idx}`;
}

function isDone(phaseId, subj, idx) {
  return !!state[topicKey(phaseId, subj, idx)];
}

function toggleTopic(phaseId, subj, idx) {
  const k = topicKey(phaseId, subj, idx);
  state[k] = !state[k];
  saveState();
  renderAll();
}

function getStats() {
  let total = 0, done = 0;
  let pyTotal = 0, pyDone = 0;
  let cnTotal = 0, cnDone = 0;
  let sqTotal = 0, sqDone = 0;

  DATA.forEach(p => {
    ['python','cn','sql'].forEach(s => {
      p[s].forEach((_, i) => {
        total++;
        const d = isDone(p.id, s, i);
        if(d) done++;
        if(s === 'python') { pyTotal++; if(d) pyDone++; }
        if(s === 'cn')     { cnTotal++; if(d) cnDone++; }
        if(s === 'sql')    { sqTotal++; if(d) sqDone++; }
      });
    });
  });

  return { total, done, pyTotal, pyDone, cnTotal, cnDone, sqTotal, sqDone };
}

function pct(done, total) {
  return total === 0 ? 0 : Math.round((done / total) * 100);
}

function renderAll() {
  const stats = getStats();
  const overall = pct(stats.done, stats.total);

  document.getElementById('total-pct').textContent = overall + '%';
  document.getElementById('bar-count').textContent = stats.done + ' / ' + stats.total + ' topics';
  document.getElementById('overall-bar').style.width = overall + '%';

  document.getElementById('py-pct').textContent = pct(stats.pyDone, stats.pyTotal) + '%';
  document.getElementById('py-bar').style.width = pct(stats.pyDone, stats.pyTotal) + '%';
  document.getElementById('cn-pct').textContent = pct(stats.cnDone, stats.cnTotal) + '%';
  document.getElementById('cn-bar').style.width = pct(stats.cnDone, stats.cnTotal) + '%';
  document.getElementById('sq-pct').textContent = pct(stats.sqDone, stats.sqTotal) + '%';
  document.getElementById('sq-bar').style.width = pct(stats.sqDone, stats.sqTotal) + '%';

  renderPhases();
}

function renderPhases() {
  const container = document.getElementById('phase-container');
  const openPhases = Array.from(document.querySelectorAll('.phase-block.open')).map(el => el.dataset.id);

  container.innerHTML = '';
  let anyVisible = false;

  DATA.forEach(phase => {
    const block = document.createElement('div');
    block.className = 'phase-block' + (openPhases.includes(String(phase.id)) ? ' open' : '');
    block.dataset.id = phase.id;

    // Phase-level progress
    let phTotal = 0, phDone = 0;
    ['python','cn','sql'].forEach(s => {
      phase[s].forEach((_, i) => {
        phTotal++;
        if(isDone(phase.id, s, i)) phDone++;
      });
    });
    const phPct = pct(phDone, phTotal);

    block.innerHTML = `
      <div class="phase-header" onclick="togglePhase(this.parentElement)">
        <span class="phase-num">Phase ${phase.id}</span>
        <span class="phase-name">${phase.title.replace(/^Phase \d+ — /, '')}</span>
        <span class="phase-weeks">${phase.weeks}</span>
        <span class="phase-prog">${phPct}%</span>
        <span class="phase-chevron">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 2 8 6 4 10"/>
          </svg>
        </span>
      </div>
      <div class="phase-progress-bar">
        <div class="phase-progress-fill" style="width:${phPct}%"></div>
      </div>
      <div class="phase-body" id="pb-${phase.id}"></div>
    `;

    container.appendChild(block);

    const body = document.getElementById('pb-' + phase.id);
    const subjects = [
      {key:'python', label:'Python / AI-ML', cls:'py'},
      {key:'cn',     label:'Computer Networks', cls:'cn'},
      {key:'sql',    label:'SQL & Databases', cls:'sq'}
    ];

    let phaseHasVisible = false;

    subjects.forEach(s => {
      if(currentFilter !== 'all' && currentFilter !== s.key &&
         currentFilter !== 'undone' && currentFilter !== 'done') return;

      const topics = phase[s.key];
      let sVisible = false;
      const rows = topics.map((text, i) => {
        const done = isDone(phase.id, s.key, i);
        if(currentFilter === 'undone' && done) return '';
        if(currentFilter === 'done' && !done) return '';
        sVisible = true;
        phaseHasVisible = true;
        anyVisible = true;
        return `
          <div class="topic-item ${s.cls}${done ? ' done' : ''}" onclick="toggleTopic(${phase.id}, '${s.key}', ${i})">
            <div class="check-box">
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 6l3 3 5-5"/>
              </svg>
            </div>
            <span class="topic-text">${text}</span>
          </div>
        `;
      }).join('');

      if(!sVisible) return;

      const sDone = topics.filter((_, i) => isDone(phase.id, s.key, i)).length;
      const section = document.createElement('div');
      section.className = 'subj-section';
      section.innerHTML = `
        <div class="subj-head">
          <span class="subj-pill ${s.cls}"><span class="dot"></span>${s.label}</span>
          <span class="subj-count">${sDone} / ${topics.length}</span>
        </div>
        ${rows}
      `;
      body.appendChild(section);
    });

    if(!phaseHasVisible) {
      block.style.display = 'none';
    } else {
      block.style.display = '';
    }
  });

  const emptyEl = document.getElementById('empty-msg');
  emptyEl.style.display = anyVisible ? 'none' : 'block';
}

function togglePhase(el) {
  el.classList.toggle('open');
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // Auto-expand all when filtering
  if(f !== 'all') {
    DATA.forEach(p => {
      const block = document.querySelector(`.phase-block[data-id="${p.id}"]`);
      if(block) block.classList.add('open');
    });
  }
  renderPhases();
}

function expandAll() {
  document.querySelectorAll('.phase-block').forEach(b => b.classList.add('open'));
}

function collapseAll() {
  document.querySelectorAll('.phase-block').forEach(b => b.classList.remove('open'));
}

function exportToCSV() {
  const stats = getStats();
  const timestamp = new Date().toLocaleString();
  
  let csvContent = 'data:text/csv;charset=utf-8,';
  
  // Header section
  csvContent += 'Roadmap Tracker Export\n';
  csvContent += `Exported on,${timestamp}\n`;
  csvContent += `Overall Progress,${stats.done}/${stats.total} topics (${pct(stats.done, stats.total)}%)\n`;
  csvContent += '\n';
  
  // Subject summary
  csvContent += 'Subject Summary\n';
  csvContent += `Python/AI-ML,${stats.pyDone}/${stats.pyTotal},${pct(stats.pyDone, stats.pyTotal)}%\n`;
  csvContent += `Networks,${stats.cnDone}/${stats.cnTotal},${pct(stats.cnDone, stats.cnTotal)}%\n`;
  csvContent += `SQL & Databases,${stats.sqDone}/${stats.sqTotal},${pct(stats.sqDone, stats.sqTotal)}%\n`;
  csvContent += '\n';
  
  // Detailed topics
  csvContent += 'Detailed Topics\n';
  csvContent += 'Phase,Subject,Topic,Status\n';
  
  DATA.forEach(phase => {
    ['python', 'cn', 'sql'].forEach(subKey => {
      const subLabel = subKey === 'python' ? 'Python/AI-ML' : (subKey === 'cn' ? 'Networks' : 'SQL & Databases');
      phase[subKey].forEach((topic, idx) => {
        const done = isDone(phase.id, subKey, idx);
        const status = done ? 'Completed' : 'Pending';
        const phaseName = phase.title.replace(/^Phase \d+ — /, '');
        
        // Escape quotes in CSV
        const escapedTopic = '"' + topic.replace(/"/g, '""') + '"';
        
        csvContent += `Phase ${phase.id},${subLabel},${escapedTopic},${status}\n`;
      });
    });
  });
  
  // Create and trigger download
  const encodedUri = encodeURI(csvContent);
  const link = document.createElement('a');
  link.setAttribute('href', encodedUri);
  link.setAttribute('download', `roadmap-tracker-${new Date().toISOString().split('T')[0]}.csv`);
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function confirmReset() {
  if(confirm('Reset all progress? This cannot be undone.')) {
    state = {};
    saveState();
    renderAll();
  }
}

// Init
loadState();
renderAll();
// Open phase 1 by default
setTimeout(() => {
  const first = document.querySelector('.phase-block[data-id="1"]');
  if(first && !first.classList.contains('open')) first.classList.add('open');
}, 0);
</script>
</body>
</html>
